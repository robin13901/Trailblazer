name: auto_explore
description: "Trailblazer — GPS trip tracker that paints roads you have driven onto an offline map."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  cupertino_icons: ^1.0.8
  drift: ^2.34.0
  # drift_flutter handles sqlite3 platform setup; DO NOT add sqlite3_flutter_libs
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  liquid_glass_renderer: 0.2.0-dev.4
  logging: ^1.3.0
  maplibre_gl: ^0.26.2
  path: ^1.9.0
  path_provider: ^2.1.6
  riverpod_annotation: ^4.0.3
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.5
  remove_from_coverage: ^2.0.0
  riverpod_generator: ^4.0.4
  # Needed by tests to install InMemorySharedPreferencesAsync for
  # `SharedPreferencesAsyncPlatform.instance` (see onboarding tests).
  shared_preferences_platform_interface: ^2.4.2
  very_good_analysis: ^10.3.0
  # riverpod_lint + custom_lint temporarily dropped:
  # drift_dev 2.34 requires analyzer ^13, custom_lint 0.8.1 pins analyzer ^8
  # — no overlapping resolution as of 2026-07. Re-add when custom_lint bumps analyzer.

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/

# App icon generation — run `dart run flutter_launcher_icons`
flutter_launcher_icons:
  image_path: "assets/icons/app_icon.jpg"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
