name: auto_explore
description: "Trailblazer — GPS trip tracker that paints roads you have driven onto an offline map."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Routing
  go_router: ^17.3.0

  # Database
  drift: ^2.34.0
  drift_flutter: ^0.3.0   # handles sqlite3 platform setup; DO NOT add sqlite3_flutter_libs

  # Filesystem
  path_provider: ^2.1.6
  path: ^1.9.0

  # Logging & preferences
  logging: ^1.3.0
  shared_preferences: ^2.5.5

  # Platform UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  riverpod_generator: ^4.0.4

  # Lints
  very_good_analysis: ^10.3.0
  # riverpod_lint + custom_lint temporarily dropped:
  # drift_dev 2.34 requires analyzer ^13, custom_lint 0.8.1 pins analyzer ^8
  # — no overlapping resolution as of 2026-07. Re-add when custom_lint bumps analyzer.

  # Testing
  mocktail: ^1.0.5
  remove_from_coverage: ^2.0.0

flutter:
  uses-material-design: true
  generate: true
