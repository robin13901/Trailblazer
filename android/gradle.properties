org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# ==== Built-in Kotlin deferral (Phase 1 chore, 2026-07-03) ====
# Flutter 3.44 warns that the `kotlin-android` Gradle Plugin will be removed
# in a future Flutter release. The full migration requires AGP 9.0+, which
# is a breaking upgrade from our pinned AGP 8.11.1 (see settings.gradle.kts).
#
# Setting both flags to `false` explicitly opts into the legacy KGP path and
# silences the deprecation warning until we bump AGP. Migration steps for
# when we do the bump:
#   1. Bump AGP to 9.0+ in android/settings.gradle.kts
#   2. Remove `id("kotlin-android")` from android/app/build.gradle.kts
#   3. Remove the `kotlinOptions { ... }` block from the `android { }` DSL
#   4. Add top-level `kotlin { compilerOptions { jvmTarget = JvmTarget.JVM_17 } }`
#   5. Flip both flags below to `true` (or delete them — `true` becomes default)
# Reference: https://docs.flutter.dev/release/breaking-changes/migrate-to-built-in-kotlin/for-app-developers
# ================================================================
android.builtInKotlin=false
android.newDsl=false
